<!doctype html>
<html>
<head>

	<!--
	About this page:

	-->
	<title>Unbranding</title>

	<style>
		body {
			font-family: Arial, sans-serif;
			margin: 0;
			padding: 0;
			background-color: #f0f0f0;
		}
		
		nav {
			background-color: #0053E2;
			height: 4rem;
			position: sticky;
			top: 0;
			z-index: 1;
		}

		.nav-spacer {
			display: flex;
			flex-direction: row;
		}

		.nav-icon {
			width: 3rem;
			height: 4rem;
			vertical-align: bottom;
		}

		.nav-button {
			background-color: #000000;
			width: 6rem;
			height: 2rem;
			vertical-align: bottom;
			margin-top: 1rem;
			line-height: 2rem;
			color: white;
			text-align: center;
			text-decoration: none;
			display: inline-block;
			border-radius: 10%;
			margin-left: auto;
			margin-right: 1rem
		}

		.site-container {
			top: 5rem;
			display: block;
			background-color: #fefefe;
			width: 100%;
			max-width: 45%;
			height: calc(l00vh - 20rem);
		}

	</style>
	
</head>
<body>
	<nav>
		<div class="nav-spacer">
			<img class="nav-icon" style="filter: invert(100%);" src="assets/burger.svg" alt="Burger Icon">
			<img class="nav-icon" src="assets/walmart-logo.svg" alt="Logo Icon">
			<a class="nav-button" href="#">Button</a>
		</div>
	</nav>

	<h1>Hello, world!</h1>
</body>
</html>
